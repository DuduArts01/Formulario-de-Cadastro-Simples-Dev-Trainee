<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main>
        <article class="container">
            <form class="formulario" id="myform">
                <h1>Formulário de Cadastro</h1>

                <section class="data">
                    <label>Nome Completo</label>
                    <input type="text" placeholder="Digite seu nome completo" id="name">
                </section>

                <section class="data">
                    <label>Email</label>
                    <input type="text" placeholder="Digite seu email" id="email">
                </section>

                <section class="data">
                    <label>Senha</label>
                    <input type="text" placeholder="Digite sua senha" id="password">
                </section>

                <section class="data">
                    <label>Telefone</label>
                    <input type="text" placeholder="(00) 00000-0000" id="phone">
                </section>

                <section class="data">
                    <label>Mensagem</label>
                    <input type="text" placeholder="Digite sua mensagem" id="message" class="message">
                </section>
                
                <button class="submit_button">
                    Enviar
                </button>
 
            </form>
        </article>
    </main>

    <script src="script.js"></script>
</body>
</html>
